<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WB Scanner RMS Pro</title>
<style>
:root{
  --bg:#0d0f1a;--card:#141726;--card2:#1a1f35;--border:#252a45;
  --yellow:#f59e0b;--green:#10b981;--red:#f87171;--cyan:#22d3ee;
  --muted:#6b7280;--white:#f1f5f9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:system-ui,sans-serif;min-height:100vh;padding:12px}
h1{font-size:16px;font-weight:800;color:var(--yellow);letter-spacing:1px;margin-bottom:12px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px}
select,input{width:100%;background:var(--bg);color:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--cyan)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.btn{padding:10px 16px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;width:100%}
.btn-scan{background:var(--cyan);color:#000}
.btn-scan:hover{opacity:.9}
.btn-stop{background:var(--red);color:#fff}
.btn-save{background:var(--green);color:#fff;font-size:11px;padding:5px 10px;width:auto;border-radius:6px}
.console{background:#000;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:var(--green);min-height:36px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:var(--muted);font-size:10px;font-weight:700;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:6px 4px;border-bottom:1px solid #1a1f35}
.formula{color:var(--cyan);font-family:monospace;cursor:pointer}
.formula:hover{text-decoration:underline}
.pred{color:var(--yellow);font-weight:700;font-size:14px}
.hit-pct{color:var(--green);font-weight:700}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:20px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;width:100%;max-width:420px;margin:auto}
.modal-title{color:var(--yellow);font-weight:800;font-size:15px;margin-bottom:12px}
.trek-line{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #1a1f35;font-size:13px}
.trek-period{color:var(--muted);font-family:monospace;min-width:50px}
.trek-pred{font-family:monospace;font-weight:700;min-width:60px;letter-spacing:2px}
.trek-status{margin-left:auto;font-size:11px;font-weight:700}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.badge-hit{background:rgba(16,185,129,.2);color:var(--green)}
.badge-patah{background:rgba(248,113,113,.2);color:var(--red)}
.btn-close{background:none;border:1px solid var(--border);color:var(--white);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .3s}
.tag-jenis{font-size:9px;color:var(--muted);font-weight:700}

/* ── BANK RUMUS ANGKANET STYLE ── */
.bank-import-bar{display:flex;gap:6px;margin-bottom:8px}
.bank-import-bar input{flex:1;background:var(--bg);color:var(--white);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;font-family:monospace;outline:none;width:auto}
.bank-import-bar input:focus{border-color:var(--cyan)}
.btn-import-rms{background:var(--cyan);color:#000;border:none;border-radius:8px;padding:9px 16px;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap}
.bank-import-form{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:none}
.bank-filter-bar{margin-bottom:8px}
.bank-filter-bar select{background:var(--bg);color:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;width:100%;outline:none}
.bank-tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.bank-tbl-wrap table{font-size:12px}
.bank-tbl-wrap th{font-size:10px;font-weight:800;padding:8px 5px;text-transform:uppercase}
.bank-tbl-wrap td{padding:7px 5px;border-bottom:1px solid #1a1f35;vertical-align:middle}
.bank-tbl-wrap tr:last-child td{border-bottom:none}
.bank-row-sel{background:rgba(34,211,238,.05)}
.bank-chk{width:34px;text-align:center}
input.rchk{accent-color:var(--cyan);width:15px;height:15px;cursor:pointer}
.bank-tipe .pas{color:var(--cyan);font-weight:800;font-size:12px;line-height:1.2}
.bank-tipe .jen{color:var(--muted);font-size:9px;font-weight:700}
.bank-hari-badge{background:var(--card2);border:1px solid var(--border);color:var(--white);border-radius:5px;padding:3px 7px;font-size:11px}
.bank-angka{font-weight:800;font-size:14px;font-family:monospace;letter-spacing:1px;color:var(--yellow)}
.bank-put{color:var(--muted);font-size:12px;font-weight:700}
.bank-status-ok{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:800}
.bank-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.bact{padding:9px 14px;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;border:none;transition:opacity .15s;letter-spacing:.3px}
.bact:disabled{opacity:.3;cursor:not-allowed}
.bact:active{opacity:.7}
.bact-hapus{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)!important;border-style:solid!important}
.bact-update{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3)!important;border-style:solid!important}
.bact-trek{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.3)!important;border-style:solid!important}
.bact-rekap{background:var(--cyan);color:#000}
/* TREK MODAL BANK */
.bank-trek-line{display:flex;align-items:center;gap:6px;padding:5px 2px;border-bottom:1px solid #1a1f35;font-size:12px;font-family:monospace}
.btrk-r{color:var(--muted);min-width:48px;font-size:11px}
.btrk-p{font-weight:800;min-width:55px;letter-spacing:2px}
.btrk-lbl{color:var(--muted);font-size:11px}
.btrk-s{margin-left:auto}
/* REKAP MODAL */
.rek-block{background:var(--card2);border-radius:8px;padding:10px;margin-bottom:8px;font-family:monospace;font-size:12px;line-height:1.9}
.rek-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.rek-ai{color:var(--white)}
.rek-kres{color:var(--yellow);font-weight:800}
.rek-top{color:var(--green);font-weight:800}
.rek-cad{color:#a78bfa;font-weight:800}
.modal-scroll{max-height:60vh;overflow-y:auto}
</style>
</head>
<body>

<h1>📡 WONGBAGUS SCANNER RMS PRO</h1>

<!-- TAB NAV -->
<div style="display:flex;gap:6px;margin-bottom:10px">
  <button id="tab-btn-scanner" onclick="switchTab('scanner')" style="flex:1;padding:8px;border-radius:8px;border:none;font-weight:700;font-size:12px;background:var(--cyan);color:#000;cursor:pointer">📡 Scanner</button>
  <button id="tab-btn-bank" onclick="switchTab('bank')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);font-weight:700;font-size:12px;background:var(--card);color:var(--muted);cursor:pointer">💾 Bank Rumus</button>
</div>

<!-- DATA STATUS -->
<div id="data-status" style="background:#0a2a1a;border:1px solid #1a4a2a;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
  <span id="data-status-text" style="font-size:11px;color:var(--green);font-family:monospace">📦 Data: loading...</span>
  <button onclick="doRefreshData()" id="btn-refresh" style="padding:5px 12px;border-radius:6px;border:none;background:var(--green);color:#000;font-weight:700;font-size:11px;cursor:pointer">🔄 Refresh</button>
</div>

<!-- TAB SCANNER -->
<div id="tab-scanner">

<!-- PENGATURAN -->
<div class="card">
  <div class="section-title">Pengaturan Scan</div>
  <div class="grid2">
    <div>
      <label>Pasaran</label>
      <select id="sc-pasaran" onchange="updatePasaran()"></select>
    </div>
    <div>
      <label>Limit Baris</label>
      <input type="number" id="sc-limit" value="15" min="5" max="60" placeholder="cth: 15" style="text-align:center;font-weight:700">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Jenis Trek</label>
      <select id="sc-jenis">
        <option value="ai_ke">AI 2D Belakang (KE)</option>
        <option value="ai_ac">AI 2D Depan (AC)</option>
        <option value="ai_ck">AI 2D Tengah (CK)</option>        <option value="bbfs_ke">BBFS KE</option>
        <option value="bbfs_ac">BBFS AC</option>
        <option value="bbfs_ck">BBFS CK</option>
        <option value="pos_e">Posisi Ekor</option>
        <option value="pos_k">Posisi Kepala</option>
        <option value="pos_a">Posisi As</option>
        <option value="pos_c">Posisi Cop</option>
      </select>
    </div>
    <div>
      <label>Digit Output</label>
      <input type="number" id="sc-digit" value="4" min="2" max="8" placeholder="cth: 4" style="text-align:center;font-weight:700">
    </div>
  </div>
  <div class="grid2">
    <div>
      <label>Max Patah</label>
      <select id="sc-patah">
        <option value="0">Patah 0</option>
        <option value="1">Patah 1</option>
        <option value="2">Patah 2</option>
        <option value="3">Patah 3</option>
        <option value="5">Patah 5</option>
      </select>
    </div>
    <div>
      <label>Target Cari</label>
      <select id="sc-target">
        <option value="5">5 Rumus</option>
        <option value="10" selected>10 Rumus</option>
        <option value="20">20 Rumus</option>
        <option value="50">50 Rumus</option>
      </select>
    </div>
  </div>
  <div class="grid2" style="margin-top:4px">
    <button class="btn btn-scan" id="btn-scan" onclick="startScan()">📡 SCAN</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopScan()" style="display:none">⏹ STOP</button>
  </div>
</div>

<!-- CONSOLE -->
<div class="console" id="sc-console">&gt;_ Siap scan...</div>
<div class="progress-bar"><div class="progress-fill" id="sc-progress" style="width:0%"></div></div>

<!-- HASIL -->
<div class="card" id="result-card" style="display:none">
  <div class="section-title">Hasil Scan</div>
  <table>
    <thead>
      <tr>
        <th>Formula</th>
        <th>Pred</th>
        <th>PJG</th>
        <th>HIT%</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="result-tbody"></tbody>
  </table>
</div>

<!-- TREK MODAL -->
<div class="modal-overlay" id="trek-modal" onclick="if(event.target===this)closeTrek()">
  <div class="modal">
    <div class="modal-title" id="trek-title">Trek</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px" id="trek-info"></div>
    <div id="trek-body"></div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn-close" onclick="closeTrek()">✕ Tutup</button>
    </div>
  </div>
</div>

</div><!-- end tab-scanner -->

<!-- TAB BANK RUMUS -->
<div id="tab-bank" style="display:none">

  <!-- IMPORT BAR -->
  <div class="bank-import-bar">
    <input type="text" id="bank-inp-code" placeholder="Masukkan kode rumus" />
    <button class="btn-import-rms" onclick="bankShowImport()">⚡ IMPORT</button>
  </div>

  <!-- IMPORT FORM (tersembunyi) -->
  <div class="bank-import-form" id="bank-import-form">
    <div class="section-title">Detail Import</div>
    <div class="grid2">
      <div><label>Pasaran</label>
        <select id="bfrm-pasaran"></select>
      </div>
      <div><label>Jenis Trek</label>
        <select id="bfrm-jenis">
          <option value="ai_ke">AI 2D Belakang (KE)</option>
          <option value="ai_ac">AI 2D Depan (AC)</option>
          <option value="ai_ck">AI 2D Tengah (CK)</option>          <option value="bbfs_ke">BBFS KE</option>
          <option value="pos_e">Posisi Ekor</option>
          <option value="pos_k">Posisi Kepala</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div><label>Limit Baris</label>
        <input type="number" id="bfrm-limit" value="14" min="5" max="50" style="text-align:center;font-weight:700"></div>
      <div><label>Digit Output</label>
        <input type="number" id="bfrm-digit" value="2" min="2" max="6" style="text-align:center;font-weight:700"></div>
    </div>
    <div style="font-size:11px;color:var(--cyan);font-family:monospace;margin-bottom:8px;padding:6px;background:var(--bg);border-radius:6px" id="bfrm-preview">Formula: --</div>
    <div style="display:flex;gap:8px">
      <button onclick="bankHideImport()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer">✕ Batal</button>
      <button onclick="bankDoImport()" style="flex:2;padding:8px;border-radius:8px;border:none;background:var(--cyan);color:#000;font-size:12px;font-weight:800;cursor:pointer">✅ Simpan Rumus</button>
    </div>
  </div>

  <!-- INFO BAR -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span id="bank-info" style="font-size:11px;color:var(--muted)"></span>
    <span id="bank-count-badge" style="background:var(--card2);border:1px solid var(--border);color:var(--cyan);font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px">0 rumus</span>
  </div>

  <!-- FILTER PASARAN -->
  <div class="bank-filter-bar">
    <select id="bank-filter-pas" onchange="renderBank()">
      <option value="">-- Pilih Pasaran --</option>
    </select>
  </div>

  <!-- TABEL RUMUS -->
  <div class="bank-tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="bank-chk"><input type="checkbox" class="rchk" id="bank-chk-all" onchange="bankToggleAll(this)"></th>
          <th>TIPE</th>
          <th>HARI</th>
          <th>ANGKA</th>
          <th>P...</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="bank-tbody"></tbody>
    </table>
    <div id="bank-empty" style="text-align:center;padding:24px;color:var(--muted);font-size:12px;display:none">
      💾 Belum ada rumus.<br><span style="font-size:11px">Scan lalu Save, atau Import kode rumus</span>
    </div>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="bank-actions">
    <button class="bact bact-hapus" id="bact-hapus" onclick="bankHapusSelected()" disabled>🗑 Hapus</button>
    <button class="bact bact-update" id="bact-update" onclick="bankUpdateSelected()" disabled>🔄 Update</button>
    <button class="bact bact-trek" id="bact-trek" onclick="bankOpenTrek()" disabled>📋 Trek</button>
    <button class="bact bact-rekap" id="bact-rekap" onclick="bankOpenRekap()" disabled>📊 Rekap</button>
  </div>


  <!-- BANK TREK MODAL -->
  <div class="modal-overlay" id="bank-trek-modal" onclick="if(event.target===this)bankCloseTrek()">
    <div class="modal" style="max-width:420px">
      <div class="modal-title" id="bank-trek-title">Detail Trek</div>
      <div style="background:var(--bg);border-radius:8px;padding:10px;font-family:monospace;font-size:11px;line-height:1.8;margin-bottom:10px;white-space:pre-wrap;word-break:break-all" id="bank-trek-meta"></div>
      <div class="modal-scroll" id="bank-trek-body"></div>
      <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
        <button onclick="bankCopyTrek()" style="padding:7px 14px;border-radius:8px;border:none;background:var(--cyan);color:#000;font-weight:700;font-size:12px;cursor:pointer">📋 Copy</button>
        <button class="btn-close" onclick="bankCloseTrek()">✕ Tutup</button>
      </div>
    </div>
  </div>

  <!-- BANK REKAP MODAL -->
  <div class="modal-overlay" id="bank-rekap-modal" onclick="if(event.target===this)bankCloseRekap()">
    <div class="modal" style="max-width:380px">
      <div class="modal-title">📊 Rekap Prediksi</div>
      <div class="modal-scroll" id="bank-rekap-body"></div>
      <div style="margin-top:12px;text-align:right">
        <button class="btn-close" onclick="bankCloseRekap()">✕ Tutup</button>
      </div>
    </div>
  </div>

</div><!-- end tab-bank -->

<script>
/**
 * wb_data.js -- WongBagus Prediction - Shared Data Module
 * ========================================================
 * Dipakai oleh SEMUA halaman: index.html, rekap_2d-1.html,
 * bola_merah.html, rekap_3d.html, rekap_4d.html, pola_sgp.html,
 * kalender_togel.html, bank_rumus.html, dll.
 *
 * CARA PAKAI (di tiap halaman, sebelum script utama):
 *   <script src="./wb_data.js"><\/script>
 *
 * API publik:
 *   WBData.getAll()            → { hk:{result,status,updated,name,...}, ..., _meta:{} }
 *   WBData.get(id)             → entry untuk 1 pasaran, atau null
 *   WBData.getResult(id)       → string 4-digit / '----' / null
 *   WBData.onUpdate(callback)  → register listener; dipanggil setiap data berubah
 *   WBData.offUpdate(callback) → hapus listener
 *   WBData.isFresh()           → true jika cache < 90 menit
 *   WBData.metaUpdated()       → string timestamp terakhir update
 *   WBData.MARKETS             → array definisi 65 pasaran (readonly)
 *   WBData.KEYWORD_MAP         → array keyword→id mapping
 *
 * index.html memanggil WBData._write(rj) setelah dapat data
 * dari result.json / paito-harian. Halaman lain HANYA membaca.
 */

(function(global) {
  'use strict';

  // ── Storage key ─────────────────────────────────────────────
  const CACHE_KEY   = 'wb_rj_v3';        // sama dg index.html lama
  const SHARED_KEY  = 'wb_shared_v1';    // kunci baru yg dipakai halaman lain
  const CACHE_TTL   = 90 * 60 * 1000;   // 90 menit

  // ── Internal state ──────────────────────────────────────────
  let _data   = null;   // object result.json terakhir
  let _ts     = 0;      // epoch ms saat data ditulis
  let _listeners = [];

  // ── 65 PASARAN definisi ─────────────────────────────────────
  const MARKETS = [
    // ASIA UTAMA
    {id:'hk',   flag:'🇭🇰',name:'Hongkong',       short:'HK',    time:'23:00',days:'Setiap Hari', an:'/data-pengeluaran-togel-hongkong-pools/',         wb:'hongkong-pools'},
    {id:'hkl',  flag:'🇭🇰',name:'HK Lotto',       short:'HKL',   time:'23:00',days:'Setiap Hari', an:'/data-pengeluaran-togel-hklotto/',                 wb:''},
    {id:'sgp',  flag:'🇸🇬',name:'Singapore',      short:'SGP',   time:'17:40',days:'Sen,Rab,Kam,Sab,Min', an:'/data-pengeluaran-togel-singapore/',       wb:'singapore'},
    {id:'sdy',  flag:'🇦🇺',name:'Sydney Pools',   short:'SDY',   time:'13:45',days:'Setiap Hari', an:'/data-pengeluaran-togel-sydney-pools/',           wb:'sydney-pools'},
    {id:'sdl',  flag:'🇦🇺',name:'Sydney Lotto',   short:'SDL',   time:'13:45',days:'Sen-Sab',      an:'/data-pengeluaran-togel-sdlotto/',                wb:'sdlotto'},
    {id:'kam',  flag:'🇰🇭',name:'Kamboja',        short:'KAM',   time:'11:50',days:'Setiap Hari', an:'/data-pengeluaran-togel-magnum-cambodia/',         wb:'magnum-cambodia'},
    {id:'bull', flag:'🇳🇿',name:'Bullseye NZ',    short:'BULL',  time:'13:10',days:'Setiap Hari', an:'/data-pengeluaran-togel-bullseye/',                wb:'bullseye'},
    {id:'chn',  flag:'🇨🇳',name:'China Pools',    short:'CHN',   time:'15:30',days:'Setiap Hari', an:'/data-pengeluaran-togel-chinapools/',              wb:'chinapools'},

      localStorage.setItem(SHARED_KEY, JSON.stringify(payload));
    } catch (e) {}
  }

    // Coba SHARED_KEY dulu (lebih fresh), lalu CACHE_KEY lama
    for (const key of [SHARED_KEY, CACHE_KEY]) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) continue;
        const { ts, rj } = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) continue;
        return { ts, rj };
      } catch (e) {}
    }
    return null;
  }

      return await res.json();
    } catch (e) { return null; }
  }

  // ── Fetch via CORS proxy ──────────────────────────────────────
  async function _proxyFetch(url) {
    for (const makeProxy of PROXIES) {
      try {
        const res = await Promise.race([
          fetch(makeProxy(url)),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000)),
        ]);
        if (!res.ok) continue;
        const data = await res.json();
        const html = typeof data === 'string' ? data : (data.contents || data.data || '');
        if (html && html.length > 100) return html;
      } catch (e) {}
    }
    return null;
  }

  // ── Parse paito-harian HTML → {id: result4digit} ─────────────
  function _parsePaitoHarian(html) {
    const found = {};
    if (!html || html.length < 500) return found;
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Strategy 1: container dengan heading
    const containers = [...doc.querySelectorAll('section,div,article,li')].filter(el => {
      const cls = (el.className || '').toLowerCase();
      return /market|pasaran|paito|result|item|card|pool/.test(cls);
    });
    for (const sec of containers) {
      const hEl = sec.querySelector('h1,h2,h3,h4,h5,strong');
      if (!hEl) continue;
      const key = matchMarket(hEl.textContent || '');
      if (!key || found[key]) continue;
      for (const tag of sec.querySelectorAll('span,td,div,b,p')) {
        const t = (tag.textContent || '').trim();
        if (/^\d{4}$/.test(t) && !isFake(t)) { found[key] = t; break; }
      }
    }

    // Strategy 2: .paito-row-item grouped by parent
    if (Object.keys(found).length < 10) {
      const rowMap = new Map();
      for (const item of doc.querySelectorAll('.paito-row-item')) {
        const pid = item.parentElement;
        if (!rowMap.has(pid)) rowMap.set(pid, { texts: [], result: null });
        const t = (item.textContent || '').trim();
        rowMap.get(pid).texts.push(t);
        if (!rowMap.get(pid).result && /^\d{4}$/.test(t) && !isFake(t))
          rowMap.get(pid).result = t;
      }
      for (const [, info] of rowMap) {
        if (!info.result) continue;
        const key = matchMarket(info.texts.join(' '));
        if (key && !found[key]) found[key] = info.result;
      }
    }

    // Strategy 3: scan tr/li
    if (Object.keys(found).length < 5) {
      let count = 0;
      for (const block of doc.querySelectorAll('tr,li')) {
        if (++count > 3000) break;
        const t = (block.textContent || '').trim();
        if (!/^\d{4}$/.test(t) || isFake(t)) continue;
        const pTxt = block.parentElement ? (block.parentElement.textContent || '') : '';
        const key = matchMarket(pTxt);
        if (key && !found[key]) found[key] = t;
      }
    }
    return found;
  }

    const html = await _proxyFetch(PAITO_HARIAN_URL);
    const found = _parsePaitoHarian(html || '');
    const count = Object.keys(found).length;
    console.log('[WBData] paito-harian:', count, 'pasaran');

    if (count >= 5) {

      _write(rj);
      return rj;
    }

    // 3. Return data cache lama (mungkin stale, tapi lebih baik dari kosong)
    return _data;
  }

function parseElemCode(code, hist) {

  if(nDigit===3) return [1,3,5];
  if(nDigit===4) return [1,3,5,7];
  if(nDigit===5) return [1,3,5,7,9];
  if(nDigit===6) return [0,1,3,5,7,9];
  return [1,3,5,7,9];
}

function getSrHistory(wbId, max) {
  const entry = WBData.get(wbId);
  if (!entry) return [];
  let results = [];
  if (entry.history && entry.history.length > 0) {
    results = entry.history.map(h => String(h.result||'').trim()).filter(r => /^\d{4}$/.test(r));
  }
  const todayR = String(entry.result||'').trim();
  // Tambahkan today hanya jika berbeda dari history[0]
  if (/^\d{4}$/.test(todayR) && results[0] !== todayR) {
    results.unshift(todayR);
  } else if (results.length === 0 && /^\d{4}$/.test(todayR)) {
    results.unshift(todayR);
  }
  // Hapus duplikat berurutan (bukan Set karena bisa ada angka sama di periode berbeda)
  const deduped = results.filter((r, i) => i === 0 || r !== results[i-1]);
  return deduped.slice(0, max||30);
}

// ── LOGIKA HIT ──
function checkHit(result, predStr, jenis) {
  const s = String(result).zfill4();
  const A=+s[0],C=+s[1],K=+s[2],E=+s[3];
  const digits = predStr.split('').map(Number);
  if (jenis.startsWith('ai_')) {
    const pos = jenis.slice(3);
    if(pos==='ke') return digits.includes(K) || digits.includes(E);
    if(pos==='ac') return digits.includes(A) || digits.includes(C);
    if(pos==='ck') return digits.includes(C) || digits.includes(K);
  }
  if (jenis.startsWith('bbfs_')) {
    // BBFS: WAJIB KEDUA digit target ada (AND)
    const pos = jenis.slice(5);
    let t1, t2;
    if(pos==='ke'){t1=K;t2=E;}
    else if(pos==='ac'){t1=A;t2=C;}
    else if(pos==='ck'){t1=C;t2=K;}
    else return false;
    return digits.includes(t1) && digits.includes(t2);
  }
  if (jenis.startsWith('pos_')) {
    // Posisi: salah satu digit prediksi wajib hadir di posisi target
    const pos = jenis.slice(4);
    let target;
    if(pos==='e') target=E;
    else if(pos==='k') target=K;
    else if(pos==='a') target=A;
    else if(pos==='c') target=C;
    else return false;
    return digits.includes(target);
  }
  return false;
}

String.prototype.zfill4 = function(){return this.padStart(4,'0');};

// ── SCAN ──
let scanning = false;
let scanTimer = null;
let candidates = [];
let scanned = 0;

function startScan() {
  const wbId = document.getElementById('sc-pasaran').value;
  const limit = parseInt(document.getElementById('sc-limit').value);
  const jenis = document.getElementById('sc-jenis').value;
  const nDigit = parseInt(document.getElementById('sc-digit').value);
  const maxPatah = parseInt(document.getElementById('sc-patah').value);
  const targetN = parseInt(document.getElementById('sc-target').value);
  
  const hist = getSrHistory(wbId, limit+15);
  if(hist.length < 5){
    setConsole('⚠ Data history kurang!');
    return;
  }
  
  candidates = [];
  scanned = 0;
  scanning = true;
  document.getElementById('btn-scan').style.display='none';
  document.getElementById('btn-stop').style.display='block';
  document.getElementById('result-card').style.display='none';
  document.getElementById('result-tbody').innerHTML='';
  setConsole('⏳ Scanning...');
  
  const cols = getColsByDigit(nDigit);
  const isPosisi = jenis.startsWith('pos_');
  
  function runBatch(){
    if(!scanning) return;
    const batchSize = 100;
    
    for(let b=0; b<batchSize && scanned<100000; b++){
      const e1 = ELEMS[1+Math.floor(Math.random()*(ELEMS.length-1))];
      const useE2 = Math.random()>0.4;
      const e2 = useE2 ? ELEMS[1+Math.floor(Math.random()*(ELEMS.length-1))] : '-';
      const o1 = useE2 ? OPS[Math.floor(Math.random()*OPS.length)] : '+';
      const mod = MODS[Math.floor(Math.random()*MODS.length)];
      
      let hit=0, tot=0, maxP=0, curP=0;
      
      // hist[idx] = result lama, AI dihitung dari hist.slice(idx+1)
      // Dicek masuk ke hist[idx-1] (result berikutnya/lebih baru)
      for(let idx=1; idx<hist.length && (idx-1)<limit; idx++){
        const subHist = hist.slice(idx+1);
        if(subHist.length===0) continue;
        
        const start = calcFormula(e1,o1,e2,mod,subHist);
        if(start===null) continue;
        
        let predStr;
        predStr = makePred(start, nDigit, cols);
        
        // Cek AI masuk ke result BERIKUTNYA (hist[idx-1])
        const nextResult = hist[idx-1];
        const isHit = checkHit(nextResult, predStr, jenis);
        tot++;
        if(isHit){hit++;curP=0;}
        else{curP++;if(curP>maxP)maxP=curP;}
      }
      
      if(tot<3) {scanned++;continue;}
      const acc = hit/tot;
      // minAcc hanya threshold dasar, filter patah ditangani oleh maxP<=maxPatah
      const minAcc = jenis.startsWith('bbfs_') ? (nDigit<=4 ? 0.35 : 0.40) :
                     nDigit<=2 ? 0.50 :
                     nDigit<=4 ? 0.45 :
                     0.50;
      
      if(acc>=minAcc && maxP<=maxPatah){
        const label = e2!=='-' ? `${e1}${o1}${e2}${mod!=='-'?'.'+mod:''}` 
                               : `${e1}${mod!=='-'?'.'+mod:''}`;
        // Hitung pred untuk terbaru (hist[0] = prediksi berikutnya)
        const subH0 = hist.slice(1);
        const start0 = calcFormula(e1,o1,e2,mod,subH0);
        const predNow = start0!==null ? makePred(start0,nDigit,cols) : '--';
        
        candidates.push({e1,o1,e2,mod,formula:label,acc,hit,tot,maxP,wbId,jenis,nDigit,cols,predNow,limit});
      }
      scanned++;
      
      if(candidates.length>=targetN){
        finishScan();
        return;
      }
    }
    
    const prog = Math.min(99, Math.round(scanned/1000));
    document.getElementById('sc-progress').style.width=prog+'%';
    setConsole(`⏳ Scanning... ${scanned.toLocaleString()} dicoba | ${candidates.length}/${targetN} ditemukan`);
    
    if(scanned>=100000){
      finishScan();
      return;
    }
    scanTimer = setTimeout(runBatch, 10);
  }
  
  runBatch();
}

function stopScan(){
  scanning=false;
  clearTimeout(scanTimer);
  finishScan();
}

function finishScan(){
  scanning=false;
  clearTimeout(scanTimer);
  document.getElementById('btn-scan').style.display='block';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('sc-progress').style.width='100%';
  
  if(candidates.length===0){
    setConsole(`✅ Selesai - 0 rumus ditemukan (${scanned.toLocaleString()} dicoba)`);
    return;
  }
  
  // Sort by acc desc
  candidates.sort((a,b)=>b.acc-a.acc);
  
  setConsole(`✅ Selesai - ${candidates.length} rumus ditemukan`);
  renderResults();
  document.getElementById('result-card').style.display='block';
}

function renderResults(){
  const tb = document.getElementById('result-tbody');

    </tr>
  `).join('');
}

let trekData = [];

function openTrek(idx){
  const c = candidates[idx];
  if(!c) return;
  
  const hist = getSrHistory(c.wbId, c.limit+15);
  trekData = [];
  
  document.getElementById('trek-title').textContent = 'TREK '+c.formula;
  
  let hitCount=0, patahCount=0;
  const rows = [];
  
  // Baris 0 = prediksi berikutnya (??)
  const sub0 = hist.slice(1);
  const start0 = calcFormula(c.e1,c.o1,c.e2,c.mod,sub0);
  const pred0 = start0!==null ? makePred(start0,c.nDigit,c.cols) : '--';
  rows.push({period:hist[0], pred:pred0, hit:false, isNext:true});
  
  // hist[i] = result lama, AI dihitung dari hist.slice(i+1), dicek ke hist[i-1] (berikutnya)
  for(let i=1; i<=c.limit && i<hist.length; i++){
    const subH = hist.slice(i+1);
    if(!subH.length){rows.push({period:hist[i],pred:'--',hit:false,r4d:hist[i]});continue;}
    
    const start = calcFormula(c.e1,c.o1,c.e2,c.mod,subH);
    const predStr = start!==null ? makePred(start,c.nDigit,c.cols) : '--';
    const nextResult = hist[i-1];
    const isHit = start!==null ? checkHit(nextResult, predStr, c.jenis) : false;
    
    if(isHit) hitCount++; else if(predStr!=='--') patahCount++;
    rows.push({period:hist[i],pred:predStr,hit:isHit,isNext:false,r4d:hist[i],nextR4d:nextResult});
  }
  
  document.getElementById('trek-info').innerHTML = 
    `Tipe: ${c.jenis.toUpperCase()} - Formula: ${c.formula} - `+
    `<span style="color:var(--green)">✓ HIT: ${hitCount}</span> - `+
    `<span style="color:var(--red)">✗ PATAH: ${patahCount}</span>`;
  
  // Tampilkan dari terlama ke terbaru (isNext di paling bawah) — sesuai angkanet
  const rowsDisplay2 = [...rows].reverse();
  const body = rowsDisplay2.map((row, ridx) => {
    if(row.isNext){
      return `<div class="trek-line">
        <span class="trek-period" style="color:var(--yellow);font-weight:800">${String(row.period).padStart(4,'0')}</span>
        <span class="trek-pred" style="color:var(--yellow)">${row.pred}</span>
        <span class="trek-status" style="color:var(--yellow)">??</span>
      </div>`;
    }
    // Highlight berdasarkan result BERIKUTNYA (lebih baru = ridx-1 di rowsDisplay2)
    const nextRow2 = ridx > 0 ? rowsDisplay2[ridx-1] : null;
    const ns2 = nextRow2 ? String(nextRow2.period||'').padStart(4,'0') : '0000';
    const K=+ns2[2],E=+ns2[3],A=+ns2[0],C=+ns2[1];
    const targets = getTargets(K,E,A,C,c.jenis);
    
    const predHtml = row.pred.split('').map(d=>{
      const isH = targets.includes(+d);
      return `<span style="color:${isH?(row.hit?'var(--green)':'var(--red)'):'var(--muted)'};font-weight:${isH?800:400}">${d}</span>`;
    }).join('');
    
    return `<div class="trek-line">
      <span class="trek-period">${String(row.period).padStart(4,'0')}</span>
      <span class="trek-pred">${predHtml}</span>
      <span class="trek-status">${row.hit?'<span class="badge badge-hit">✓</span>':'<span class="badge badge-patah">✗</span>'}</span>
    </div>`;
  }).join('');
  
  document.getElementById('trek-body').innerHTML = body;
  document.getElementById('trek-modal').classList.add('open');
}

function getTargets(K,E,A,C,jenis){
  if(jenis.startsWith('ai_ke')||jenis.startsWith('bbfs_ke')) return [K,E];
  if(jenis.startsWith('ai_ac')||jenis.startsWith('bbfs_ac')) return [A,C];
  if(jenis.startsWith('ai_ck')||jenis.startsWith('bbfs_ck')) return [C,K];
  if(jenis.endsWith('_e')||jenis==='pos_e') return [E];
  if(jenis.endsWith('_k')||jenis==='pos_k') return [K];
  if(jenis.endsWith('_a')||jenis==='pos_a') return [A];
  if(jenis.endsWith('_c')||jenis==='pos_c') return [C];
  return [K,E];
}

// Parse kode rumus panjang: HKG_ai_JD3m3+J4D3ml.m9_L14-P0-D2_AE
function bankParseKode(kode) {
  kode = (kode||'').trim();
  const long = kode.match(/^([A-Z]+)_([a-z_]+)_(.+?)_L(\d+)-P(\d+)-D(\d+)/i);
  if (long) {
    const pasMap = {hkg:'hk',sgp:'sgp',sdy:'sdy',sdl:'sdl',kam:'kam',hk:'hk',mac1:'mac1',mac2:'mac2',mac3:'mac3',mac4:'mac4'};
    const wbId = pasMap[long[1].toLowerCase()] || long[1].toLowerCase();
    const jenis = long[2].replace(/_$/,'');
    const formula = long[3];
    const limit = parseInt(long[4]);
    const digit = parseInt(long[6]);
    return {wbId, jenis, formula, limit, digit, raw: kode};
  }
  return {wbId:'hk', jenis:'ai_ke', formula: kode, limit:14, digit:2, raw: kode};
}

function bankParseFormula(fm) {
  // Format: E1op E2.mod atau E1.mod atau E1op E2
  // Contoh: Jt2.C5.ix → e1=Jt2, op=., e2=C5, mod=ix
  //         E8.K9.m6  → e1=E8, op=., e2=K9, mod=m6 (op titik = perkalian mod10)
  //         E8+K9.m6  → e1=E8, op=+, e2=K9, mod=m6
  //         E8.m6     → e1=E8, op=+, e2=-, mod=m6
  //         K9        → e1=K9, op=+, e2=-, mod=-

  // Cek format dengan operator eksplisit (+/-) dan mod: E1+E2.mod atau E1-E2.mod
  const withPlusMinus = fm.match(/^([A-Za-z0-9]+)([+\-])([A-Za-z0-9]+)(?:\.([a-z][a-z0-9]*))?$/i);
  if (withPlusMinus) return {
    e1: withPlusMinus[1], o1: withPlusMinus[2],
    e2: withPlusMinus[3], mod: withPlusMinus[4]||'-'
  };

  // Cek format E1.E2.mod (titik sebagai operator perkalian)
  // Split by titik: bagian-bagian
  const parts = fm.split('.');
  if (parts.length >= 3) {
    // E1.E2.mod → parts[0]=E1, parts[1]=E2, parts[2]=mod
    // Cek apakah parts[0] dan parts[1] adalah element code valid
    const isElem = s => /^[A-Za-z][A-Za-z0-9]*\d+$/.test(s);
    const isMod  = s => /^[a-z][a-z0-9]*$/.test(s) && (MOD_TABLE[s] !== undefined || s === '-');
    if (isElem(parts[0]) && isElem(parts[1])) {
      return {e1: parts[0], o1: '.', e2: parts[1], mod: parts[2]||'-'};
    }
  }
  if (parts.length === 2) {
    const isElem = s => /^[A-Za-z][A-Za-z0-9]*\d+$/.test(s);
    if (isElem(parts[0]) && isElem(parts[1])) {
      // E1.E2 tanpa mod
      return {e1: parts[0], o1: '.', e2: parts[1], mod: '-'};
    }
    // E1.mod
    return {e1: parts[0], o1: '+', e2: '-', mod: parts[1]||'-'};
  }

  // Single element
  const noOp = fm.match(/^([A-Za-z0-9]+)$/i);
  if (noOp) return {e1: noOp[1], o1: '+', e2: '-', mod: '-'};

  return {e1:'-', o1:'+', e2:'-', mod:'-'};
}

// Hitung prediksi terkini untuk 1 item bank
function bankCalcPred(item) {
  const hist = getSrHistory(item.wbId, (item.limit||14) + 5);
  if (hist.length < 2) return '--';
  const {e1,o1,e2,mod} = bankParseFormula(item.formula);
  const cols = getColsByDigit(item.nDigit||2);
  const isPosisi = (item.jenis||'').startsWith('pos_');
  const sub0 = hist.slice(1);
  const start0 = calcFormula(e1, o1, e2, mod, sub0);
  if (start0 === null) return '--';
  return makePred(start0, item.nDigit||2, cols);
}

    const shortName = (m.short || (m.name||item.wbId).split(' ')[0]).substring(0,4).toUpperCase();
    const jenisLabel = bankJenisShort(item.jenis||'');
    // Selalu hitung ulang prediksi fresh pakai nDigit yang benar
    const pred = bankCalcPred(item);
    return `<tr class="bank-row" data-id="${item.id}">
      <td class="bank-chk"><input type="checkbox" class="rchk" data-id="${String(item.id)}" onchange="bankOnChk()"></td>
      <td class="bank-tipe">
        <div class="pas">${shortName}</div>
        <div class="jen">${jenisLabel}</div>
      </td>
      <td><span class="bank-hari-badge">Harian</span></td>
      <td class="bank-angka">${pred}</td>
      <td class="bank-put">${item.limit||14}</td>
      <td><span class="bank-status-ok">✅ OK</span></td>
    </tr>`;
  }).join('');

  bankUpdateActions();
}

    bbfs_ke:'BBFS KE', bbfs_ac:'BBFS AC', bbfs_ck:'BBFS CK',
    pos_e:'Pos E', pos_k:'Pos K', pos_a:'Pos As', pos_c:'Pos Cop'

}

function bankHideImport() {

}

function bankDoImport() {
  const kode = (document.getElementById('bank-inp-code')||{}).value||'';
  const parsed = bankParseKode(kode);
  const wbId = (document.getElementById('bfrm-pasaran')||{}).value || parsed.wbId;
  const jenis = (document.getElementById('bfrm-jenis')||{}).value || parsed.jenis;
  const limit = parseInt((document.getElementById('bfrm-limit')||{}).value)||14;
  const nDigit = parseInt((document.getElementById('bfrm-digit')||{}).value)||2;
  const formula = parsed.formula;

  // Hitung prediksi & akurasi
  const {e1,o1,e2,mod} = bankParseFormula(formula);
  const hist = getSrHistory(wbId, limit+15);
  const cols = getColsByDigit(nDigit);
  const isPosisi = jenis.startsWith('pos_');
  let hit=0, tot=0, curP=0, maxP=0;
  // hist[i] = result lama, AI dihitung dari hist.slice(i+1), dicek ke hist[i-1]
  for(let i=1; i<=limit && i<hist.length; i++){
    const subH = hist.slice(i+1);
    if(!subH.length) continue;
    const start = calcFormula(e1,o1,e2,mod,subH);
    if(start===null) continue;
    const predStr = makePred(start, nDigit, cols);
    const nextResult = hist[i-1];
    const isHit = checkHit(nextResult, predStr, jenis);
    tot++;
    if(isHit){hit++;curP=0;}else{curP++;if(curP>maxP)maxP=curP;}
  }
  const sub0 = hist.slice(1);
  const s0 = calcFormula(e1,o1,e2,mod,sub0);
  const predNow = s0!==null?makePred(s0,nDigit,cols):'--';

  const bank = JSON.parse(localStorage.getItem('wb_bank_rms')||'[]');
  bank.push({
    id: 'rms_'+Date.now(),
    formula, wbId, jenis, nDigit, limit,
    acc: tot>0?hit/tot:0,
    predNow, maxPatah: maxP,
    rawKode: kode,
    savedAt: new Date().toISOString()
  });
  localStorage.setItem('wb_bank_rms', JSON.stringify(bank));
  bankHideImport();
  if (document.getElementById('bank-inp-code')) document.getElementById('bank-inp-code').value='';
  renderBank();
}

function bankHapusSelected() {
  // Ambil semua checkbox yang dicentang
  const checkedBoxes = [...document.querySelectorAll('.rchk[data-id]:checked')];
  if(!checkedBoxes.length) return;
  const ids = checkedBoxes.map(c => c.dataset.id);
  
  let bank = JSON.parse(localStorage.getItem('wb_bank_rms')||'[]');

  bank.forEach((item,i) => {

  });

  bank = bank.filter(x => !ids.includes(String(x.id)));
  localStorage.setItem('wb_bank_rms', JSON.stringify(bank));
  renderBank();
}

function bankUpdateSelected() {
  const ids = bankGetCheckedIds(); // array of string
  if(!ids.length) return;
  let bank = JSON.parse(localStorage.getItem('wb_bank_rms')||'[]');
  const mMap = {};
  (WBData.MARKETS||[]).forEach(m=>mMap[m.id]=m);
  bank = bank.map(item => {
    if(!ids.includes(String(item.id))) return item;
    const {e1,o1,e2,mod} = bankParseFormula(item.formula);
    const hist = getSrHistory(item.wbId, (item.limit||14)+15);
    const cols = getColsByDigit(item.nDigit||2);
    const isPosisi = (item.jenis||'').startsWith('pos_');
    let hit=0,tot=0,curP=0,maxP=0;
    // hist[i] = result lama, AI dihitung dari hist.slice(i+1), dicek ke hist[i-1]
    for(let i=1;i<=(item.limit||14)&&i<hist.length;i++){
      const subH=hist.slice(i+1); if(!subH.length)continue;
      const start=calcFormula(e1,o1,e2,mod,subH); if(start===null)continue;
      const predStr=makePred(start,item.nDigit||2,cols);
      const nextResult=hist[i-1];
      const isHit=checkHit(nextResult,predStr,item.jenis);
      tot++;if(isHit){hit++;curP=0;}else{curP++;if(curP>maxP)maxP=curP;}
    }
    const s0=calcFormula(e1,o1,e2,mod,hist.slice(1));
    item.predNow=s0!==null?makePred(s0,item.nDigit||2,cols):'--';

function bankShowTrek(item) {
  const {e1,o1,e2,mod} = bankParseFormula(item.formula);
  const hist = getSrHistory(item.wbId, (item.limit||14)+15);
  const cols = getColsByDigit(item.nDigit||2);
  const isPosisi = (item.jenis||'').startsWith('pos_');
  const markets = WBData.MARKETS||[];
  const mMap={}; markets.forEach(m=>mMap[m.id]=m);
  const m = mMap[item.wbId]||{};

  document.getElementById('bank-trek-title').textContent = 'Detail Trek';

  let hitCount=0, patahCount=0;
  const rows=[];

  // hist[0] = result terbaru → AI dihitung dari hist.slice(1), belum ada result berikutnya → ??
  const sub0=hist.slice(1);
  const start0=calcFormula(e1,o1,e2,mod,sub0);
  const pred0=start0!==null?makePred(start0,item.nDigit||2,cols):'--';
  rows.push({r:hist[0], pred:pred0, isNext:true});

  // hist[i] = result ke-(i+1):
  //   AI dihitung dari hist.slice(i+1) (data lebih lama)
  //   Dicek masuk ke hist[i-1] (result berikutnya/lebih baru)
  for(let i=1;i<=(item.limit||14)&&i<hist.length;i++){
    const r=hist[i];
    const subH=hist.slice(i+1);
    if(!subH.length){rows.push({r,pred:'--',isNext:false,hit:false});continue;}
    const start=calcFormula(e1,o1,e2,mod,subH);
    const predStr=start!==null?(makePred(start,item.nDigit||2,cols)):'--';
    // Cek AI masuk ke result BERIKUTNYA (hist[i-1])
    const nextResult=hist[i-1];
    const isHit=start!==null?checkHit(nextResult,predStr,item.jenis):false;
    if(isHit)hitCount++;else if(predStr!=='--')patahCount++;
    rows.push({r,pred:predStr,isNext:false,hit:isHit});
  }

  document.getElementById('bank-trek-meta').innerHTML =
    `<span style="color:var(--cyan)">Code : ${item.rawKode||item.formula}</span><br>`+
    `Rumus : ${bankJenisShort(item.jenis||'')}<br>`+
    `<span style="color:var(--green)">HIT: ${hitCount}</span> &nbsp; <span style="color:var(--red)">PATAH: ${patahCount}x</span>`;

  // Tampilkan dari terlama (bawah) ke terbaru (atas), isNext di paling bawah — sesuai angkanet
  const rowsDisplay = [...rows].reverse();
  const body = rowsDisplay.map((row, ridx) => {
    if(row.isNext){
      return `<div class="bank-trek-line">
        <span class="btrk-r" style="color:var(--yellow);font-weight:800">${String(row.r).padStart(4,'0')}</span>
        <span class="btrk-lbl" style="color:var(--muted)">:</span>
        <span class="btrk-p" style="color:var(--yellow)">${row.pred}</span>
        <span class="btrk-lbl" style="color:var(--muted)">?</span>
        <span class="btrk-s"><span class="badge" style="background:rgba(245,158,11,.2);color:var(--yellow)">??</span></span>
      </div>`;
    }
    // Gunakan result BERIKUTNYA (lebih baru = index ridx-1 di rowsDisplay) untuk highlight
    const nextRow = ridx > 0 ? rowsDisplay[ridx-1] : null;
    const ns = nextRow ? String(nextRow.r).padStart(4,'0') : '0000';
    const A=+ns[0],C=+ns[1],K=+ns[2],E=+ns[3];
    const targets = getTargets(K,E,A,C,item.jenis);
    const predHtml = row.pred.split('').map(d=>{
      const h=targets.includes(+d);
      return `<span style="color:${h?(row.hit?'var(--green)':'var(--red)'):'var(--muted)'};font-weight:${h?800:400}">${d}</span>`;
    }).join('');
    return `<div class="bank-trek-line">
      <span class="btrk-r">${String(row.r).padStart(4,'0')}</span>
      <span class="btrk-lbl" style="color:var(--muted)">:</span>
      <span class="btrk-p">${predHtml}</span>
      <span class="btrk-lbl" style="color:var(--muted)">ai</span>
      <span class="btrk-s">${row.hit?'<span class="badge badge-hit">✓</span>':'<span class="badge badge-patah">✗</span>'}</span>
    </div>`;
  }).join('');

  // Buat teks untuk Copy (format sesuai angkanet: terlama di atas, ?? di bawah)
  const copyLines = rowsDisplay.map(row => {
    if(row.isNext) return `${String(row.r).padStart(4,'0')} : ${row.pred} ?`;
    return `${String(row.r).padStart(4,'0')} : ${row.pred} ai`;
  });
  const copyText = 
    `Code  : ${item.rawKode||item.formula}\n` +
    `Rumus : ${bankJenisShort(item.jenis||'')}\n\n` +
    copyLines.join('\n') +
    `\n\nAI : ${pred0}\n===============\n${item.limit||14} putaran | patah ${patahCount}x`;
  _lastTrekCopyText = copyText;

  document.getElementById('bank-trek-body').innerHTML = body +
    `<div style="margin-top:10px;padding:8px;background:var(--card2);border-radius:6px;font-size:12px;font-family:monospace;line-height:1.8">
      <span style="color:var(--cyan)">AI : ${pred0}</span><br>
      <span style="color:var(--muted)">===============</span><br>
      <span style="color:var(--white)">${item.limit||14} putaran | patah ${patahCount}x</span>
    </div>`;

  document.getElementById('bank-trek-modal').classList.add('open');
}

let _lastTrekCopyText = '';

function bankCopyTrek() {
  if (!_lastTrekCopyText) return;
  // Coba clipboard API dulu
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(_lastTrekCopyText).then(()=>{
      alert('✅ Teks trek berhasil dicopy!');

    if (btn) { btn.textContent = '✅ Dicopy!'; setTimeout(()=>{ btn.textContent='✅ Pilih Semua'; },1500); }

function bankShowRekap(items) {
  const markets = WBData.MARKETS||[];
  const mMap={}; markets.forEach(m=>mMap[m.id]=m);

  const aiList=[], allDigits=[];
  items.forEach(item=>{
    // Pakai bankCalcPred agar konsisten (sudah handle nDigit dengan benar)
    const pred = bankCalcPred(item);
    const m=mMap[item.wbId]||{};
    aiList.push({pred, name:(m.short||item.wbId).toUpperCase()});
    if(pred!=='--') allDigits.push(...pred.split('').map(Number));
  });

  // Frekuensi digit
  const freq={};
  allDigits.forEach(d=>{freq[d]=(freq[d]||0)+1;});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);

  const kres4=sorted.slice(0,4).map(x=>x[0]).join('');
  const kres3=sorted.slice(0,2).map(x=>x[0]).join('');
  const top4=sorted.slice(0,4).map(x=>+x[0]).sort((a,b)=>a-b);
  const cad3=sorted.slice(0,3).map(x=>+x[0]).sort((a,b)=>a-b);
  const cad2=sorted.slice(0,2).map(x=>+x[0]).sort((a,b)=>a-b);

  const pasaran = items.length>0?(mMap[items[0].wbId]||{}).name||items[0].wbId:'';

  const aiHtml = aiList.map(a=>
    `<div><span style="color:var(--muted)">AI  : </span><span style="color:var(--cyan);font-weight:800">${a.pred}</span></div>`
  ).join('');

  document.getElementById('bank-rekap-body').innerHTML = `
    <div class="rek-lbl">Hasil Rekap Pasaran ${pasaran}</div>
    <div class="rek-block">${aiHtml}
      <div style="margin-top:6px;border-top:1px dashed var(--border);padding-top:6px">
        <div>KRES 4 : <span class="rek-kres">${kres4||'--'}</span></div>
        <div>KRES 3 : <span class="rek-kres">${kres3||'--'}</span></div>
      </div>
    </div>
    <div class="rek-lbl">TOP & CAD Line</div>
    <div class="rek-block">
      <div>[TOP] ${top4.length} Line</div>
      <div class="rek-top">${top4.join('*')||'--'}</div>
      <div style="margin-top:6px">[CAD 1] ${cad3.length} Line</div>
      <div class="rek-cad">${cad3.join('*')||'--'}</div>
      <div style="margin-top:6px">[CAD 2] ${cad2.length} Line</div>
      <div class="rek-cad">${cad2.join('*')||'--'}</div>
    </div>`;

  document.getElementById('bank-rekap-modal').classList.add('open');
}

function openTrekDirect(c) {
  const hist = getSrHistory(c.wbId, c.limit + 15);
  if (hist.length < 3) {
    alert('⚠ Data history kurang, coba Refresh Data dulu');
    return;
  }
  document.getElementById('trek-title').textContent = 'TREK ' + c.formula;
  let hitCount = 0, patahCount = 0;
  const rows = [];
  const sub0 = hist.slice(1);
  const start0 = calcFormula(c.e1, c.o1, c.e2, c.mod, sub0);
  const pred0 = start0 !== null ? (c.jenis.startsWith('pos_') ? String(start0) : makePred(start0, c.nDigit, c.cols)) : '--';
  rows.push({period: hist[0], pred: pred0, hit: false, isNext: true});
  // hist[i] = result ke-(i+1), AI-nya dihitung dari hist.slice(i+1)
  for (let i = 1; i <= c.limit && i < hist.length; i++) {
    const r = hist[i];
    const subH = hist.slice(i + 1);
    if (!subH.length) { rows.push({period: r, pred: '--', hit: false}); continue; }
    const start = calcFormula(c.e1, c.o1, c.e2, c.mod, subH);
    const predStr = start !== null ? (c.jenis.startsWith('pos_') ? String(start) : makePred(start, c.nDigit, c.cols)) : '--';
    const nextResult = hist[i - 1];
    const isHit = start !== null ? checkHit(nextResult, predStr, c.jenis) : false;
    if (isHit) hitCount++; else if (predStr !== '--') patahCount++;
    rows.push({period: r, pred: predStr, hit: isHit, isNext: false, r4d: r, nextR4d: nextResult});
  }
  document.getElementById('trek-info').innerHTML =
    `Tipe: ${c.jenis.toUpperCase()} · Formula: ${c.formula} · ` +
    `<span style="color:var(--green)">✓ HIT: ${hitCount}</span> · ` +
    `<span style="color:var(--red)">✗ PATAH: ${patahCount}</span>`;
  // Tampilkan dari terlama ke terbaru (isNext di paling bawah) — sesuai angkanet
  const rowsDisplay = [...rows].reverse();
  const body = rowsDisplay.map(row => {
    if (row.isNext) {
      return `<div class="trek-line">
        <span class="trek-period" style="color:var(--yellow);font-weight:800">${String(row.period).padStart(4,'0')}</span>
        <span class="trek-pred" style="color:var(--yellow)">${row.pred}</span>
        <span class="trek-status" style="color:var(--yellow)">??</span>
      </div>`;
    }
    const s = String(row.r4d || '').padStart(4, '0');
    const sNext = String(row.nextR4d || '').padStart(4, '0');
    const K = +sNext[2], E = +sNext[3], A = +sNext[0], C = +sNext[1];
    const targets = getTargets(K, E, A, C, c.jenis);
    const predHtml = row.pred.split('').map(d => {
      const isH = targets.includes(+d);
      return `<span style="color:${isH?(row.hit?'var(--green)':'var(--red)'):'var(--muted)'};font-weight:${isH?800:400}">${d}</span>`;
    }).join('');
    return `<div class="trek-line">
      <span class="trek-period">${s}</span>
      <span class="trek-pred">${predHtml}</span>
      <span class="trek-status">${row.hit?'<span class="badge badge-hit">✓</span>':'<span class="badge badge-patah">✗</span>'}</span>
    </div>`;
  }).join('');
  document.getElementById('trek-body').innerHTML = body;
  document.getElementById('trek-modal').classList.add('open');
}

// Init
initPasaran();
updateDataStatus();
setConsole('Siap scan -- pilih pasaran dan klik SCAN');

// Auto-fetch jika data stale
(async function autoFetch() {
  if (!WBData.isFresh()) {
    const statusEl = document.getElementById('data-status-text');
    statusEl.textContent = '⏳ Auto-fetch dari GitHub...';
    statusEl.style.color = 'var(--yellow)';
    try {
      const rj = await WBData.refresh();
      if (rj && Object.keys(rj).length > 3) {
        initPasaran();
        updateDataStatus();
      } else {
        updateDataStatus();
      }
    } catch(e) {
      updateDataStatus();
    }
  }
})();
</script>
