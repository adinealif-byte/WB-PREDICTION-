<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rumus Otomatis — WONGBAGUS PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;
  --bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;
  --border:rgba(245,158,11,.15);--border2:rgba(255,255,255,.06);
  --text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#ef4444;
  --cyan:#00d4ff;--orange:#f97316;--purple:#7c3aed;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-200px;right:-100px;width:500px;height:500px;
  background:radial-gradient(circle,rgba(249,115,22,.05) 0%,transparent 65%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-200px;left:-100px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(245,158,11,.04) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(7,7,14,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:999;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--orange),#c2410c);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue';font-size:15px;color:#fff;font-weight:900;flex-shrink:0;
  box-shadow:0 0 20px rgba(249,115,22,.35);}
.logo-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold-light),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-sub{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;}
.topbar-badge{font-size:9px;padding:3px 9px;background:rgba(249,115,22,.1);
  border:1px solid rgba(249,115,22,.25);border-radius:20px;color:#fb923c;font-weight:800;margin-left:auto;}

/* ── WRAP ── */
.wrap{max-width:640px;margin:0 auto;padding:12px 12px 60px;position:relative;z-index:1;}

/* ── HERO ── */
.hero{text-align:center;padding:16px 0 10px;}
.hero-icon{font-size:40px;display:block;margin-bottom:6px;}
.hero-title{font-family:'Bebas Neue';font-size:32px;letter-spacing:3px;
  background:linear-gradient(90deg,var(--orange),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6;}

/* ── STEPS ── */
.steps{display:flex;align-items:center;justify-content:center;gap:3px;
  margin:14px 0;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:800;}
.step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:900;flex-shrink:0;transition:.3s;}
.step.active .step-dot{background:var(--orange);color:#fff;box-shadow:0 0 12px rgba(249,115,22,.4);}
.step.done .step-dot{background:var(--green);color:#fff;}
.step.idle .step-dot{background:var(--bg3);color:var(--muted);border:1px solid var(--border2);}
.step.active .step-label{color:var(--orange);}
.step.done .step-label{color:var(--green);}
.step.idle .step-label{color:var(--muted);}
.step-line{width:16px;height:1px;background:var(--border2);}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:11px;}
.card-title{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:block;width:3px;height:12px;
  background:linear-gradient(180deg,var(--orange),var(--gold));border-radius:2px;}

/* ── FORM ── */
label{font-size:10px;color:var(--muted);font-weight:800;display:block;
  margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;}
select,input[type=text]{
  background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:9px 12px;color:var(--text);font-family:'Nunito';font-size:13px;
  font-weight:600;width:100%;outline:none;margin-bottom:10px;transition:border-color .2s;}
select:focus,input[type=text]:focus{border-color:var(--orange);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.form-row>div select,.form-row>div input{margin-bottom:0;}
.hint{font-size:10px;color:var(--green);font-weight:700;min-height:16px;margin:-7px 0 9px;
  display:flex;align-items:center;gap:4px;}

/* ── RESULT INPUT 3 KOLOM ── */
.r-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.r-row input{margin-bottom:0;font-family:'Bebas Neue';font-size:22px;
  letter-spacing:4px;text-align:center;color:var(--gold);padding:10px 6px;}

/* ── PASARAN SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{padding-left:34px;margin-bottom:0;}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--muted);pointer-events:none;}

/* ── BUTTONS ── */
.btn{padding:11px 16px;border-radius:9px;border:none;cursor:pointer;
  font-family:'Nunito';font-size:13px;font-weight:800;transition:.2s;
  width:100%;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-orange{background:linear-gradient(135deg,var(--orange),#c2410c);color:#fff;
  box-shadow:0 4px 20px rgba(249,115,22,.3);}
.btn-orange:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
.btn-orange:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-green{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);}
.btn-green:hover{background:rgba(16,185,129,.22);}
.btn-autofill{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
  color:var(--green);border-radius:8px;padding:6px 12px;font-family:'Nunito';
  font-size:11px;font-weight:800;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-autofill:hover:not(:disabled){background:rgba(16,185,129,.22);}
.btn-autofill:disabled{opacity:.35;cursor:not-allowed;}

/* ── RESULT HERO ── */
.result-hero{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(194,65,12,.07));
  border:1px solid rgba(249,115,22,.3);border-radius:14px;padding:18px;
  text-align:center;margin-bottom:12px;position:relative;overflow:hidden;}
.result-hero::before{content:'⚡';position:absolute;top:-8px;right:10px;
  font-size:60px;opacity:.05;pointer-events:none;}
.result-hero-lbl{font-size:9px;font-weight:800;color:#fb923c;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:6px;}
.result-4d{font-family:'Bebas Neue';font-size:60px;letter-spacing:10px;color:#fff;
  line-height:1;text-shadow:0 0 40px rgba(249,115,22,.5);}
.result-sub{display:flex;justify-content:center;gap:18px;margin-top:10px;flex-wrap:wrap;}
.result-pill .lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;}
.result-pill .val{font-family:'Barlow Condensed';font-size:22px;font-weight:700;color:var(--orange);}
.conf-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;
  padding:3px 10px;border-radius:20px;margin-top:10px;}
.conf-high{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.conf-med{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3);}
.conf-low{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.25);}

/* ── ANGKA CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.chip{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-family:'Bebas Neue';font-size:18px;font-weight:700;}
.chip-orange{background:rgba(249,115,22,.18);border:1.5px solid rgba(249,115,22,.4);color:#fb923c;}
.chip-red{background:rgba(220,38,38,.15);border:1.5px solid rgba(220,38,38,.35);color:#f87171;}
.chip-gold{background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.4);color:var(--gold);}
.chip-green{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.35);color:#34d399;}

/* ── RUMUS LIST ── */
.rumus-list{display:flex;flex-direction:column;gap:7px;}
.rumus-row{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:9px 12px;display:flex;align-items:center;gap:10px;transition:.2s;}
.rumus-row:hover{border-color:rgba(249,115,22,.25);}
.rumus-idx{width:22px;height:22px;border-radius:6px;background:rgba(249,115,22,.15);
  border:1px solid rgba(249,115,22,.3);display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;color:#fb923c;flex-shrink:0;}
.rumus-info{flex:1;min-width:0;}
.rumus-name{font-size:11px;font-weight:800;color:var(--text);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.rumus-formula{font-size:10px;color:var(--muted);margin-top:1px;
  font-family:'Barlow Condensed';letter-spacing:.3px;}
.rumus-pred{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;
  color:var(--orange);flex-shrink:0;}

/* ── TOP FREQ ── */
.freq-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.freq-item{flex:1;min-width:50px;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:9px;padding:8px 6px;text-align:center;transition:.2s;}
.freq-item.top1{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.4);}
.freq-num{font-family:'Bebas Neue';font-size:24px;color:var(--muted);}
.freq-item.top1 .freq-num{color:#fb923c;}
.freq-cnt{font-size:9px;color:var(--muted);font-weight:700;}

/* ── AI BOX ── */
.ai-box{background:linear-gradient(135deg,rgba(249,115,22,.07),rgba(194,65,12,.03));
  border:1px solid rgba(249,115,22,.2);border-radius:11px;padding:13px;margin-top:10px;}
.ai-title{font-size:10px;font-weight:800;color:#fb923c;letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.ai-text{font-size:12px;color:var(--text);line-height:1.75;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border2);margin:12px 0;}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border2);}

/* ── LOADING ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.spin{animation:spin .8s linear infinite;display:inline-block;}
.dots span{width:6px;height:6px;background:var(--orange);border-radius:50%;
  display:inline-block;animation:pulse .8s ease-in-out infinite;margin:0 2px;}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:25px;font-size:12px;font-weight:700;
  z-index:9999;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(16,185,129,.4);color:var(--green);}
.toast.err{border-color:rgba(220,38,38,.4);color:#f87171;}

/* ── PASARAN GROUP CHIP ── */
.group-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.gtab{padding:4px 10px;border-radius:16px;font-size:10px;font-weight:800;
  cursor:pointer;border:1px solid var(--border2);color:var(--muted);
  background:transparent;transition:.2s;font-family:'Nunito';}
.gtab.active,.gtab:hover{border-color:var(--orange);color:var(--orange);
  background:rgba(249,115,22,.08);}

footer{text-align:center;font-size:10px;color:var(--muted);padding:20px 0;
  border-top:1px solid var(--border);}
</style>
<script src="./wb_data.js" onerror="var s=document.createElement('script');s.src='https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/wb_data.js';document.head.appendChild(s);"></script>
</head>
<body>

<!-- TOPBAR -->

<script>
/* ══════════════════════════════════════════
   TABEL KONVERSI ANGKA (Scan Angka 3.1 resmi)
══════════════════════════════════════════ */
const MOD = {
  ix:{0:5,1:6,2:7,3:8,4:9,5:0,6:1,7:2,8:3,9:4},
  ty:{0:7,1:4,2:9,3:6,4:1,5:8,6:3,7:0,8:5,9:2},
  ml:{0:9,1:8,2:7,3:6,4:5,5:4,6:3,7:2,8:1,9:0},
  mb:{0:8,1:7,2:6,3:9,4:5,5:4,6:3,7:2,8:1,9:0},
  m0:{0:6,1:5,2:8,3:7,4:9,5:0,6:2,7:3,8:1,9:4},
  m1:{0:1,1:2,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:0},
  m2:{0:2,1:3,2:0,3:9,4:7,5:6,6:5,7:4,8:1,9:8},
  m3:{0:3,1:2,2:1,3:0,4:9,5:8,6:7,7:6,8:5,9:4},
  m4:{0:6,1:5,2:3,3:7,4:8,5:9,6:0,7:1,8:2,9:4},
  m5:{0:5,1:4,2:3,3:2,4:1,5:0,6:9,7:8,8:7,9:6},
  m6:{0:6,1:8,2:4,3:5,4:9,5:3,6:0,7:9,8:2,9:1},
  m7:{0:7,1:6,2:5,3:4,4:3,5:2,6:1,7:0,8:9,9:8},
  m8:{0:8,1:7,2:6,3:5,4:4,5:3,6:2,7:1,8:0,9:9},
  m9:{0:9,1:8,2:7,3:6,4:5,5:4,6:3,7:2,8:1,9:0},
};

function applyMod(v, mod){
  const t = MOD[mod];
  return t ? (t[v] ?? v) : v;
}

/* ══════════════════════════════════════════
   20 RUMUS OTOMATIS LOKAL (matematika murni)
══════════════════════════════════════════ */
function hitungLokal(r1, r2, r3){
  const d = (s,i) => parseInt(s[i]||'0');
  const mod = (n,m=10) => ((n%m)+m)%m;
  const fmt2 = n => String(mod(Math.abs(n),100)).padStart(2,'0');
  const fmt1 = n => String(mod(n));

  const [as1,kp1,kk1,ek1] = [d(r1,0),d(r1,1),d(r1,2),d(r1,3)];
  const [as2,kp2,kk2,ek2] = [d(r2,0),d(r2,1),d(r2,2),d(r2,3)];
  const [as3,kp3,kk3,ek3] = [d(r3,0),d(r3,1),d(r3,2),d(r3,3)];

  // Konversi modifier
  const A1ix=applyMod(as1,'ix'), K1ml=applyMod(kk1,'ml'), E1ty=applyMod(ek1,'ty');
  const A2mb=applyMod(as2,'mb'), K2m3=applyMod(kk2,'m3'), E2m5=applyMod(ek2,'m5');
  const A3m7=applyMod(as3,'m7'), K3ix=applyMod(kk3,'ix'), E3ml=applyMod(ek3,'ml');
  const P1ml=applyMod(kp1,'ml'), P2ty=applyMod(kp2,'ty'), P3m1=applyMod(kp3,'m1');

  // Js = jumlah as+ekor, Jd = jumlah kop+kep, Jt = semua
  const js1=mod(as1+ek1), jd1=mod(kp1+kk1), jt1=mod(as1+kp1+kk1+ek1);
  const js2=mod(as2+ek2), jd2=mod(kp2+kk2), jt2=mod(as2+kp2+kk2+ek2);

  return [
    {nama:'A1 — Jum Kep+Ek',      formula:`(${kk1}+${ek1}) · (${as1}+${kp1})`,          pred:fmt2(mod(kk1+ek1)*10+mod(as1+kp1))},
    {nama:'A2 — Selisih R1R2',    formula:`|${kk1}-${ek2}| · |${as1}-${kp2}|`,          pred:fmt2(Math.abs(kk1-ek2)*10+Math.abs(as1-kp2))},
    {nama:'A3 — Cross R1R2',      formula:`(${ek1}+${as2}) · (${kp1}+${ek2})`,          pred:fmt2(mod(ek1+as2)*10+mod(kp1+ek2))},
    {nama:'A4 — Diagonal 3R',     formula:`(${as1}+${kk2}+${ek3}) · (${ek1}+${kp2}+${as3})`, pred:fmt2(mod(as1+kk2+ek3)*10+mod(ek1+kp2+as3))},
    {nama:'A5 — Mirror 2D',       formula:`Balik ${r1.slice(2)} = ${r1.slice(2).split('').reverse().join('')}`, pred:r1.slice(2).split('').reverse().join('')},
    {nama:'A6 — Naik +1',         formula:`(${kk1}+1) · (${ek1}+1)`,                    pred:`${mod(kk1+1)}${mod(ek1+1)}`},
    {nama:'A7 — Naik +2',         formula:`(${kk2}+2) · (${ek2}+2)`,                    pred:`${mod(kk2+2)}${mod(ek2+2)}`},
    {nama:'A8 — Jum 3R',          formula:`(${as1}+${as2}+${as3}) · (${ek1}+${ek2}+${ek3})`, pred:`${mod(as1+as2+as3)}${mod(ek1+ek2+ek3)}`},
    {nama:'A9 — Silang 3R',       formula:`(${kp1}+${kk2}+${ek3}) · (${as1}+${kp3})`,  pred:`${mod(kp1+kk2+ek3)}${mod(as1+kp3)}`},
    {nama:'A10 — Js1 + Jd1',      formula:`Js1=${js1} + Jd1=${jd1}`,                    pred:fmt2(mod(js1+jd1)*10+mod(js1-jd1))},
    // === RUMUS DENGAN MODIFIER KONVERSI ===
    {nama:'B1 — A1.ix + E1.ml',   formula:`A1.ix(${A1ix}) + E1.ml(${K1ml})`,            pred:fmt2(mod(A1ix+K1ml)*10+mod(A1ix-K1ml))},
    {nama:'B2 — K1.ml + E1.ty',   formula:`K1.ml(${K1ml}) + E1.ty(${E1ty})`,            pred:`${mod(K1ml+E1ty)}${mod(K1ml-E1ty)}`},
    {nama:'B3 — A2.mb + K2.m3',   formula:`A2.mb(${A2mb}) · K2.m3(${K2m3})`,            pred:`${mod(A2mb+K2m3)}${mod(A2mb-K2m3)}`},
    {nama:'B4 — E2.m5 + A3.m7',   formula:`E2.m5(${E2m5}) + A3.m7(${A3m7})`,            pred:`${mod(E2m5+A3m7)}${mod(E2m5-A3m7)}`},
    {nama:'B5 — Js1.ix + Jd2.ml', formula:`Js1.ix(${applyMod(js1,'ix')}) + Jd2.ml(${applyMod(jd2,'ml')})`, pred:`${mod(applyMod(js1,'ix')+applyMod(jd2,'ml'))}${mod(applyMod(js1,'ix')-applyMod(jd2,'ml'))}`},
    {nama:'B6 — Jt1.ml + Jt2.m3', formula:`Jt1.ml(${applyMod(jt1,'ml')}) + Jt2.m3(${applyMod(jt2,'m3')})`, pred:`${mod(applyMod(jt1,'ml')+applyMod(jt2,'m3'))}${mod(applyMod(jt1,'ml')-applyMod(jt2,'m3'))}`},
    {nama:'B7 — P1.ml - P2.ty',   formula:`P1.ml(${P1ml}) - P2.ty(${P2ty})`,            pred:`${mod(P1ml-P2ty)}${mod(P1ml+P2ty)}`},
    {nama:'B8 — K3.ix + E3.ml',   formula:`K3.ix(${K3ix}) + E3.ml(${E3ml})`,            pred:`${mod(K3ix+E3ml)}${mod(K3ix-E3ml)}`},
    {nama:'B9 — A1+K2+E3 mod',    formula:`(${A1ix}+${K2m3}+${E3ml})%10 · ix`,          pred:`${applyMod(mod(A1ix+K2m3+E3ml),'ix')}${applyMod(mod(A1ix+K2m3+E3ml),'ml')}`},
    {nama:'B10 — Cross mod full',  formula:`(${A2mb}+${K1ml}).(${E2m5}+${P2ty})`,        pred:`${mod(A2mb+K1ml)}${mod(E2m5+P2ty)}`},
  ];
}

/* ══════════════════════════════════════════
   PASARAN DATA & FILTER
══════════════════════════════════════════ */
let allPasaran = [];
let activeGrup = '';
let _wbReady = false;

const GRUP_MAP = {
  ASIA: ['hk','hkl','sgp','sdy','sdl','kam','bull','chn','jpn','twn','pcso'],
  MACAU: ['mac1','mac2','mac3','mac4','mac5','mac6'],
  EU: ['mrq3','mrq18','mrq21','mrq23','ger'],
  USA: ['or4','or7','or10','or13','ncd','nce','geom','geoe','geon',
        'txd','txmr','txe','txn','nyd','nye','njm','nje','flm','fle',
        'ilm','ile','indm','inde','kym','kye','mdm','mde','mim','mie',
        'mom','moe','wdm','wde','ctd','ctn','vad','van','tnm','tne','tnmr','cal','wie'],
};

function buildDropdown(list){
  const sel = document.getElementById('pasaran');
  sel.innerHTML = list.map(m =>
    `<option value="${m.id}" data-flag="${m.flag}" data-short="${m.short}">${m.flag} ${m.name} · ${m.short}</option>`
  ).join('');
  if(list.length) sel.value = list[0].id;
  onPasaranChange();
}

function filterGrup(grup){
  activeGrup = grup;
  document.querySelectorAll('.gtab').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toUpperCase()===( grup||'SEMUA').toUpperCase()
      || (b.textContent.trim()==='Semua' && !grup));
  });
  applyFilter();
}

function filterPasaran(q){
  applyFilter(q);
}

function applyFilter(q=''){
  q = q || document.getElementById('searchPasaran').value;
  let list = allPasaran;
  if(activeGrup && GRUP_MAP[activeGrup]){
    list = list.filter(m => GRUP_MAP[activeGrup].includes(m.id));
  }
  if(q.trim()){
    const kw = q.toLowerCase();
    list = list.filter(m =>
      m.name.toLowerCase().includes(kw) ||
      m.short.toLowerCase().includes(kw) ||
      m.id.toLowerCase().includes(kw)
    );
  }
  buildDropdown(list);
}

function onPasaranChange(){
  const id = document.getElementById('pasaran').value;
  const hint = document.getElementById('resultHint');
  if(!id || !_wbReady){ hint.textContent=''; return; }
  const r = WBData.getResult(id);
  const e = WBData.get(id);
  if(r && r !== '----'){
    hint.innerHTML = `<span>📡</span> Result terkini: <strong style="color:var(--gold);font-size:13px;font-family:'Bebas Neue';letter-spacing:2px;">${r}</strong>${e&&e.time?' · '+e.time:''}`;
    setStep(1,'done'); setStep(2,'active');
    document.getElementById('btnFill').disabled = false;
    document.getElementById('btnScan').disabled = false;
  } else {
    hint.innerHTML = `<span style="color:var(--muted);">⏳ Result belum tersedia</span>`;
    document.getElementById('btnFill').disabled = true;
    document.getElementById('btnScan').disabled = false;
  }
}

function autoFill(){
  const id = document.getElementById('pasaran').value;
  if(!id) return;
  const e = WBData.get(id);
  const r = WBData.getResult(id);
  if(r && r !== '----'){
    const hist = (e && e.history) || [];
    document.getElementById('r1').value = hist[0] ? hist[0].result : r;
    document.getElementById('r2').value = hist[1] ? hist[1].result : '';
    document.getElementById('r3').value = hist[2] ? hist[2].result : '';
    onR1Input(document.getElementById('r1'));
    toast('✅ Result berhasil diisi!','ok');
  } else {
    toast('⚠ Result belum tersedia','err');
  }
}

function onR1Input(el){
  el.value = el.value.replace(/\D/g,'');
  const v = el.value;
  setStep(2, v.length === 4 ? 'done' : 'active');
}

/* ══════════════════════════════════════════
   MAIN SCAN
══════════════════════════════════════════ */
async function jalankanScan(){
  const r1 = document.getElementById('r1').value.trim();
  const r2 = document.getElementById('r2').value.trim() || '0000';
  const r3 = document.getElementById('r3').value.trim() || '0000';
  if(r1.length !== 4 || isNaN(r1)){ toast('⚠ Isi R1 dulu (4 digit)!','err'); return; }

  const target = document.getElementById('target').value;
  const mode   = document.getElementById('modeAI').value;
  const selEl  = document.getElementById('pasaran');
  const pasNm  = selEl.options[selEl.selectedIndex]?.text || 'Unknown';
  const pasId  = selEl.value;

  setStep(2,'done'); setStep(3,'active'); setStep(4,'idle');

  const area = document.getElementById('hasilArea');
  area.innerHTML = `<div class="card" style="text-align:center;padding:32px;">
    <div class="spin" style="font-size:36px;">⚡</div>
    <div style="font-size:14px;font-weight:800;color:#fb923c;margin-top:12px;">Scanning otomatis...</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px;">Memproses ${mode==='groq'?'AI + ':''}20 rumus untuk ${pasNm}</div>
    <div class="dots" style="margin-top:12px;"><span></span><span></span><span></span></div>
  </div>`;
  document.getElementById('btnScan').disabled = true;

  const lokal = hitungLokal(r1, r2, r3);

  // Frekuensi
  const freq = {};
  lokal.forEach(r => { freq[r.pred] = (freq[r.pred]||0)+1; });
  const topFreq = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const best2d  = topFreq[0]?.[0] || '00';
  const kepLokal = best2d[0] || '0';
  const ekLokal  = best2d[1] || '0';

  let ai = null;
  if(mode === 'groq'){
    const key = localStorage.getItem('wb_groq_key') || '';
    if(key){
      const cacheKey = 'ro_'+(pasNm+'|'+r1+'|'+r2+'|'+r3).replace(/[^a-z0-9]/gi,'').slice(0,50);
      const cached = sessionStorage.getItem(cacheKey);
      if(cached){ try{ ai = JSON.parse(cached); }catch(e){} }
      if(!ai){
        try{
          const ctrl = new AbortController();
          const timer = setTimeout(()=>ctrl.abort(), 15000);
          const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{
            signal: ctrl.signal, method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body: JSON.stringify({
              model:'llama-3.3-70b-versatile', max_tokens:700, temperature:0,
              messages:[{role:'user',content:
                `Scan togel ${pasNm}, result: R1=${r1}, R2=${r2}, R3=${r3}. Target: ${target}.
Jawab HANYA JSON (tanpa markdown):
{"prediksi_utama":"2d","prediksi_4d":"4d","kepala":"1d","ekor":"1d","bbfs":["10 angka 0-9"],"mati":["3 angka"],"analisa":"2 kalimat","keyakinan":"Tinggi|Sedang|Rendah"}`
              }]
            })
          });
          clearTimeout(timer);
          const json = await resp.json();
          if(resp.ok){
            const raw = json.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
            ai = JSON.parse(raw);
            sessionStorage.setItem(cacheKey, raw);
          }
        }catch(e){ console.warn('AI skip:', e.message); }
      }
    }
  }

  setStep(3,'done'); setStep(4,'done');

  const pred4d   = ai?.prediksi_4d || `${r1[0]}${best2d}${r1[3]}`;
  const predMain = ai?.prediksi_utama || best2d;
  const kepala   = ai?.kepala || kepLokal;
  const ekor     = ai?.ekor || ekLokal;
  const keyLabel = ai?.keyakinan === 'Tinggi'
    ? '<span class="conf-badge conf-high">✅ Keyakinan Tinggi</span>'
    : ai?.keyakinan === 'Sedang'
    ? '<span class="conf-badge conf-med">⚡ Keyakinan Sedang</span>'
    : '<span class="conf-badge conf-low">⚠ Keyakinan Rendah</span>';
  const srcBadge = ai
    ? '<span style="background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);color:#fb923c;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">🤖 AI + Lokal</span>'
    : '<span style="background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--cyan);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">📊 Lokal</span>';

  area.innerHTML = `
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px;">
      <div>
        <div style="font-family:'Bebas Neue';font-size:16px;color:var(--gold-light);letter-spacing:1px;">${pasNm.split('·')[0].trim()}</div>
        <div style="font-size:10px;color:var(--muted);">R1:${r1} · R2:${r2} · R3:${r3} · Target:${target}</div>
      </div>
      ${srcBadge}
    </div>

    <!-- HERO RESULT -->
    <div class="result-hero">
      <div class="result-hero-lbl">⚡ Prediksi Utama — ${target}</div>
      <div class="result-4d">${pred4d}</div>
      <div class="result-sub">
        <div class="result-pill"><div class="lbl">2D</div><div class="val">${predMain}</div></div>
        <div class="result-pill"><div class="lbl">Kepala</div><div class="val">${kepala}</div></div>
        <div class="result-pill"><div class="lbl">Ekor</div><div class="val">${ekor}</div></div>
      </div>
      ${ai ? keyLabel : ''}
    </div>

    ${ai && ai.bbfs ? `
    <div class="sec-lbl">🎲 BBFS AI</div>
    <div class="chips">${(ai.bbfs||[]).slice(0,10).map(n=>`<div class="chip chip-orange">${n}</div>`).join('')}</div>
    <div class="sec-lbl">💀 Angka Mati</div>
    <div class="chips">${(ai.mati||[]).slice(0,5).map(n=>`<div class="chip chip-red">${n}</div>`).join('')}</div>
    <div class="divider"></div>` : ''}

    <!-- 20 RUMUS -->
    <div class="sec-lbl">📊 20 Rumus Otomatis</div>
    <div class="rumus-list" id="rumusList">
      ${lokal.map((r,i)=>`
      <div class="rumus-row">
        <div class="rumus-idx">${i+1}</div>
        <div class="rumus-info">
          <div class="rumus-name">${r.nama}</div>
          <div class="rumus-formula">${r.formula}</div>
        </div>
        <div class="rumus-pred">${r.pred}</div>
      </div>`).join('')}
    </div>

    <div class="divider"></div>

    <!-- TOP FREQ -->
    <div class="sec-lbl">📈 Paling Sering Muncul</div>
    <div class="freq-row">
      ${topFreq.slice(0,5).map(([n,f],i)=>`
      <div class="freq-item${i===0?' top1':''}">
        <div class="freq-num">${n}</div>
        <div class="freq-cnt">${f}×</div>
      </div>`).join('')}
    </div>

    ${ai && ai.analisa ? `
    <div class="ai-box">
      <div class="ai-title">🤖 Analisa AI — ${pasNm.split('·')[0].trim()}</div>
      <div class="ai-text">${ai.analisa}</div>
    </div>` : ''}

    <div class="divider"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="copyHasil()" style="font-size:12px;flex:1;">📋 Copy Hasil</button>
      <button class="btn btn-green" onclick="scanLagi()" style="font-size:12px;flex:1;">🔄 Scan Lagi</button>
    </div>
  </div>`;

  window._scanData = {r1,r2,r3,pred4d,predMain,kepala,ekor,lokal,topFreq,ai,pasNm,target};
  document.getElementById('btnScan').disabled = false;
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

function scanLagi(){
  document.getElementById('hasilArea').innerHTML = '';
  document.getElementById('r1').value = '';
  document.getElementById('r2').value = '';
  document.getElementById('r3').value = '';
  setStep(1,'done'); setStep(2,'active'); setStep(3,'idle'); setStep(4,'idle');
  document.getElementById('pasaran').focus();
}

function copyHasil(){
  const d = window._scanData; if(!d) return;
  const txt = [
    '⚡ WONGBAGUS PRO — Rumus Otomatis',
    `Pasaran : ${d.pasNm.split('·')[0].trim()}`,
    `Result  : R1=${d.r1} R2=${d.r2} R3=${d.r3}  Target: ${d.target}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `Prediksi 4D : ${d.pred4d}`,
    `2D Utama    : ${d.predMain}`,
    `Kepala/Ekor : ${d.kepala} / ${d.ekor}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    ...d.lokal.map((r,i)=>`R${String(i+1).padStart(2,' ')} ${r.nama}: ${r.pred}`),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `Top 2D : ${d.topFreq.slice(0,5).map(([n,f])=>`${n}(${f}×)`).join(' · ')}`,
    ...(d.ai&&d.ai.bbfs ? [`BBFS AI: ${(d.ai.bbfs||[]).join(' ')}`] : []),
    ...(d.ai&&d.ai.mati ? [`Mati   : ${(d.ai.mati||[]).join(' ')}`] : []),
    ...(d.ai&&d.ai.analisa ? [`AI     : ${d.ai.analisa}`] : []),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    '🌐 WONGBAGUS PRO'
  ].join('\n');
  navigator.clipboard.writeText(txt)
    .then(()=>toast('✅ Tersalin!','ok'))
    .catch(()=>{
      const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0;';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      toast('✅ Tersalin!','ok');
    });
}

/* ══════════════════════════════════════════
   STEP & TOAST
══════════════════════════════════════════ */
function setStep(n, state){
  const el = document.getElementById('step'+n);
  if(el) el.className = 'step ' + state;
}

let toastTimer;
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className = 'toast'; }, 2800);
}

/* ══════════════════════════════════════════
   INIT WBData
══════════════════════════════════════════ */
async function initWB(){
  const badge = document.getElementById('topBadge');
  const status = document.getElementById('dataStatus');

  function build(){
    if(typeof WBData === 'undefined' || !WBData.MARKETS) return;
    allPasaran = WBData.MARKETS;
    buildDropdown(allPasaran);
    _wbReady = true;
    document.getElementById('btnFill').disabled = false;
    document.getElementById('btnScan').disabled = false;
    badge.textContent = `✅ ${allPasaran.length} Pasaran`;
    badge.style.color = 'var(--green)';
    badge.style.borderColor = 'rgba(16,185,129,.3)';
    status.textContent = '✅';
    WBData.onUpdate(onPasaranChange);
  }

  if(typeof WBData === 'undefined'){
    badge.textContent = '⚠ wb_data.js tidak ditemukan';
    // Fallback: load pasaran hardcode minimal
    allPasaran = [
      {id:'hk',flag:'🇭🇰',name:'Hongkong',short:'HK'},{id:'sgp',flag:'🇸🇬',name:'Singapore',short:'SGP'},
      {id:'sdy',flag:'🇦🇺',name:'Sydney',short:'SDY'},{id:'sdl',flag:'🇦🇺',name:'Sydney Lotto',short:'SDL'},
      {id:'kam',flag:'🇰🇭',name:'Kamboja',short:'KAM'},{id:'chn',flag:'🇨🇳',name:'China',short:'CHN'},
      {id:'jpn',flag:'🇯🇵',name:'Japan',short:'JPN'},{id:'twn',flag:'🇹🇼',name:'Taiwan',short:'TWN'},
    ];
    buildDropdown(allPasaran);
    _wbReady = true;
    document.getElementById('btnScan').disabled = false;
    return;
  }

  build();

  if(!WBData.isFresh()){
    status.textContent = '⏳';
    badge.textContent = '⏳ Memuat data...';
    try{ await WBData.refresh(); build(); }
    catch(e){ badge.textContent = '⚠ Gagal refresh'; }
  }
}

// Tunggu WBData siap
(function waitWB(){
  if(typeof WBData !== 'undefined' && WBData.MARKETS){
    initWB();
  } else {
    setTimeout(waitWB, 150);
  }
})();
