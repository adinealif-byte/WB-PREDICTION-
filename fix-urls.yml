name: Fix Old URLs

on:
  workflow_dispatch: # jalankan manual sekali klik

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ganti semua URL lama → baru
        run: |
          find . -name "*.html" -o -name "*.js" | xargs sed -i \
            's|https://alifavif-cmd\.github\.io/-WONGBAGUS-PREDICTION-/|https://adinealif-byte.github.io/WB-PREDICTION-/|g'

          find . -name "*.html" -o -name "*.js" | xargs sed -i \
            's|https://raw\.githubusercontent\.com/alifavif-cmd/-WONGBAGUS-PREDICTION-/main/|https://raw.githubusercontent.com/adinealif-byte/WB-PREDICTION-/main/|g'

          echo "=== File yang diubah ==="
          git diff --name-only

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: ganti semua URL lama ke domain baru"
          git push
